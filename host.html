<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Màn Hình Máy Chủ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="justify-content: flex-start; padding-top: 20px;">

    <button onclick="window.resetGameData()" style="position: absolute; top: 20px; left: 20px; padding: 10px; background: var(--red); color: white; border: none; border-radius: 5px; cursor: pointer;">🔄 RESET</button>
    
    <div style="text-align: center; margin-top: 50px;">
        <h1 style="color: var(--gold);">SỐ LƯỢNG NGƯỜI CHƠI: <span id="count-display" style="color: white;">0</span></h1>
        <button id="start-btn" onclick="window.startGlobalGame()" style="padding: 20px 40px; font-size: 2rem; background: green; color: white; border: none; border-radius: 10px; cursor: pointer;">▶ BẮT ĐẦU TRÒ CHƠI</button>
    </div>

    <ul id="live-leaderboard" style="width: 80%; margin: 20px auto; list-style: none; padding: 0;"></ul>

    <script type="module" src="host.js"></script>
</body>
</html>
